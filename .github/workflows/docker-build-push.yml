name: Backend - Build & Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .                     # dossier du backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gasy-car-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gasy-car-backend:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/gasy-car/infra
            /opt/gasy-car/infra/deploy/deploy.sh "${{ secrets.DOCKERHUB_USERNAME }}" "latest"
